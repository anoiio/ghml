id: default
version: "0.1"
description: >
  Default policy for personal/developer use.
  Allows all Claude models; moderate cost caps to prevent runaway spend.

model_allowlist:
  - claude-opus-4-7
  - claude-sonnet-4-6
  - claude-haiku-4-5

cost_caps:
  max_tokens_per_request: 4096
  max_requests_per_session: 30
  max_total_tokens_per_session: 100000
